spring:

  # -------------------------------------------------------
  # DataSource — H2 in-memory, PostgreSQL compatibility mode
  #
  # Key JDBC URL parameters explained:
  #   MODE=PostgreSQL          — makes H2 behave like PostgreSQL:
  #                              schema-qualified names, CHAR padding,
  #                              case-insensitive identifiers, NOW() function
  #   DB_CLOSE_DELAY=-1        — keep the in-memory DB alive for the full
  #                              JVM lifetime (not just the last connection)
  #   DB_CLOSE_ON_EXIT=FALSE   — prevent H2 closing on JVM shutdown hook
  #                              (keeps data available during dev restarts)
  #   NON_KEYWORDS=VALUE       — prevents "value" being treated as a reserved
  #                              word, which trips up some JPQL queries
  #   INIT=CREATE SCHEMA IF NOT EXISTS carddemo
  #                            — ensures the carddemo schema exists before
  #                              Flyway runs (H2 doesn't auto-create schemas)
  # -------------------------------------------------------
  datasource:
    url: >-
      jdbc:h2:mem:carddemo;
      MODE=PostgreSQL;
      DB_CLOSE_DELAY=-1;
      DB_CLOSE_ON_EXIT=FALSE;
      NON_KEYWORDS=VALUE;
      INIT=CREATE SCHEMA IF NOT EXISTS carddemo
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  # -------------------------------------------------------
  # H2 Web Console — browse your data at http://localhost:8080/h2-console
  #   JDBC URL to enter in the console: jdbc:h2:mem:carddemo
  #   Username: sa   Password: (leave blank)
  # -------------------------------------------------------
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false   # only localhost in dev
        trace: false

  # -------------------------------------------------------
  # JPA — local overrides
  # -------------------------------------------------------
  jpa:
    # validate — Hibernate checks the schema but Flyway owns all DDL.
    # Use 'create-drop' only if you want Hibernate to manage schema
    # independently of Flyway (not recommended — pick one).
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true   # handy to see queries during local dev

  # -------------------------------------------------------
  # Flyway — point at the H2-compatible migration scripts.
  # The migration-h2 folder contains the same V1–V6 as the
  # PostgreSQL folder but without COMMENT ON, ON CONFLICT,
  # ON UPDATE CASCADE, and now() (all replaced with H2 equivalents).
  # -------------------------------------------------------
  flyway:
    locations: classpath:db/migration-h2
    # Flyway uses the same datasource as Spring Boot automatically.
    # No separate flyway.url needed.

# -------------------------------------------------------
# Logging — more verbose for local development
# -------------------------------------------------------
logging:
  level:
    com.carddemo: DEBUG
    org.flywaydb: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE   # shows bind parameter values

springdoc:
  #  enable-spring-security: true
  #  show-login-endpoint: true
  #  show-oauth2-endpoints: true
  show-actuator: true
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

