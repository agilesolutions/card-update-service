server:
  port: 8080
  servlet:
    context-path: /card-update-service

spring:
  application:
    name: card-update-service

  # Database Configuration
  # Replaces COBOL VSAM file definitions
  datasource:
    url: jdbc:postgresql://localhost:5432/carddemo
    username: ${DB_USERNAME:carddemo}
    password: ${DB_PASSWORD:carddemo}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      pool-name: CardUpdateHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # Flyway migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Logging
logging:
  level:
    com.carddemo: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Application info
info:
  app:
    name: Card Update Service
    description: Migrated from COBOL COCRDUPC.cbl
    version: 1.0.0
    cobol-source: COCRDUPC.cbl